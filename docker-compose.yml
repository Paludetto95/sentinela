version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinel_postgres
    restart: always
    environment:
      POSTGRES_DB: sentinel_db
      POSTGRES_USER: sentinel_admin
      POSTGRES_PASSWORD: sentinel_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_admin -d sentinel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sentinel_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: sentinel_minio_user
      MINIO_ROOT_PASSWORD: sentinel_minio_password
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: sentinel_mediamtx
    restart: always
    ports:
      - "8554:8554" # RTSP
      - "1935:1935" # RTMP
      - "8888:8888" # HLS
      - "8889:8889" # WebRTC/WHEP
      - "8189:8189/udp" # WebRTC Media (UDP)
      - "9997:9997" # API
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://sentinel_admin:sentinel_password@postgres:5432/sentinel_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=sentinel_minio_user
      - MINIO_SECRET_KEY=sentinel_minio_password
      - MEDIAMTX_API_URL=http://mediamtx:9997/v3
      - JWT_SECRET=sentinel_ai_super_secret_jwt_key_2026
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: sentinel_ai_engine
    restart: always
    environment:
      - DATABASE_URL=postgresql://sentinel_admin:sentinel_password@postgres:5432/sentinel_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=sentinel_minio_user
      - MINIO_SECRET_KEY=sentinel_minio_password
      - RTSP_READER_URL=rtsp://mediamtx:8554
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mediamtx:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MEDIAMTX_WHEP_URL=http://localhost:8889

  nginx:
    image: nginx:alpine
    container_name: sentinel_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  miniodata:
